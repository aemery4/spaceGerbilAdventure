<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Gerbil Adventure 🐹</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; flex-direction:column; align-items:center; font-family:'Courier New',monospace; color:white; }
#hud { display:none; gap:10px; padding:5px 12px; background:rgba(0,0,0,0.85); border:1px solid #335; font-size:12px; flex-wrap:wrap; justify-content:center; width:800px; }
#hud span { color:#aef; }
#invBar { display:none; padding:3px 12px; background:rgba(0,0,0,0.7); border:1px solid #222; font-size:11px; color:#fa0; width:800px; }
canvas { display:block; border:2px solid #335; }
#ctrl { font-size:10px; color:#445; padding:3px; display:none; }
#message { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.95); border:2px solid #55f; padding:20px 34px; text-align:center; border-radius:10px; display:none; z-index:100; min-width:280px; max-width:460px; }
#message h2 { color:#aaf; margin-bottom:8px; font-size:17px; }
#message p { color:#ccc; font-size:12px; white-space:pre-line; line-height:1.55; }
#message button { margin-top:12px; padding:7px 20px; background:#226; border:1px solid #55f; color:white; cursor:pointer; font-family:inherit; font-size:13px; border-radius:4px; }
#message button:hover { background:#338; }
#craftPanel { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(5,5,20,0.97); border:2px solid #55f; border-radius:12px; padding:18px 22px; display:none; z-index:60; min-width:380px; }
#craftPanel h2 { color:#aaf; font-size:15px; margin-bottom:10px; text-align:center; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:10px; }
.ci { background:rgba(20,20,50,0.8); border:1px solid #334; border-radius:7px; padding:8px; cursor:pointer; }
.ci:hover:not(.cd):not(.co) { border-color:#55f; }
.cd { opacity:0.4; cursor:default; }
.co { border-color:#4f4; background:rgba(10,40,10,0.8); cursor:default; }
.cn { font-size:11px; font-weight:bold; color:#ddf; margin-bottom:2px; }
.cdesc { font-size:9px; color:#778; margin-bottom:4px; }
.cc { font-size:10px; display:flex; gap:3px; flex-wrap:wrap; }
.cc .h { color:#4f4; } .cc .l { color:#f66; }
.cclose { display:block; margin:0 auto; padding:4px 16px; background:#111; border:1px solid #335; color:#aaf; cursor:pointer; font-family:inherit; font-size:11px; border-radius:4px; }
#mapOv { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.95); border:2px solid #0f0; padding:8px; border-radius:8px; display:none; z-index:50; }
#mapOv button { display:block; margin:6px auto 0; padding:3px 14px; background:#040; border:1px solid #0f0; color:#0f0; cursor:pointer; font-family:inherit; border-radius:3px; font-size:12px; }
#craftBtn { padding:2px 7px; background:#181830; border:1px solid #44f; color:#aaf; cursor:pointer; font-family:inherit; font-size:10px; border-radius:3px; margin-left:5px; }

    /* ===== VILLAGE SHOP ===== */
    #villageShop {
      position: fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background: linear-gradient(145deg, rgba(20,12,5,0.98), rgba(30,18,8,0.98));
      border:1px solid rgba(180,130,50,0.6); border-radius:16px;
      padding:22px 26px; display:none; z-index:65; min-width:440px; max-width:560px;
      box-shadow: 0 0 60px rgba(180,120,30,0.2), 0 20px 60px rgba(0,0,0,0.8);
    }
    #shopMerchantName { font-size:16px; color:#ffd080; text-align:center; margin-bottom:4px; font-weight:bold; }
    #shopMerchantDialog { font-size:11px; color:#a88; text-align:center; margin-bottom:14px; font-style:italic; line-height:1.5; }
    #shopGrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .shop-item { background:rgba(30,18,5,0.9); border:1px solid rgba(140,90,30,0.5); border-radius:10px; padding:11px 13px; cursor:pointer; transition:all 0.18s; }
    .shop-item:hover:not(.shop-disabled):not(.shop-owned) { border-color:rgba(220,160,60,0.8); background:rgba(50,30,8,0.9); box-shadow:0 0 18px rgba(200,140,40,0.3); }
    .shop-item.shop-disabled { opacity:0.35; cursor:default; }
    .shop-item.shop-owned { border-color:rgba(60,200,80,0.5); background:rgba(8,28,12,0.9); cursor:default; }
    .shop-item-name { font-size:12px; font-weight:bold; color:#ffd; margin-bottom:4px; }
    .shop-item-desc { font-size:10px; color:#887; margin-bottom:6px; line-height:1.4; }
    .shop-cost { font-size:10px; display:flex; gap:5px; flex-wrap:wrap; }
    .shop-cost .has { color:#5d9; background:rgba(0,0,0,0.4); padding:1px 6px; border-radius:4px; }
    .shop-cost .lacks { color:#f55; background:rgba(0,0,0,0.4); padding:1px 6px; border-radius:4px; }
    #shopCloseBtn { display:block; margin:0 auto; padding:8px 24px; background:rgba(30,16,4,0.9); border:1px solid rgba(140,90,30,0.5); color:#c8a; cursor:pointer; font-family:inherit; font-size:12px; border-radius:6px; }
    #shopCloseBtn:hover { background:rgba(60,35,10,0.9); }
    /* ===== SKIN MENU ===== */
    #skinMenu {
      position: fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background: linear-gradient(145deg, rgba(8,4,20,0.99), rgba(14,6,30,0.99));
      border:1px solid rgba(180,100,255,0.5); border-radius:18px;
      padding:24px 28px; display:none; z-index:70;
      width:620px; max-height:82vh; overflow-y:auto;
      box-shadow: 0 0 80px rgba(160,80,255,0.2), 0 24px 70px rgba(0,0,0,0.85);
    }
    #skinMenu::-webkit-scrollbar { width:5px; }
    #skinMenu::-webkit-scrollbar-thumb { background:rgba(160,80,255,0.5); border-radius:3px; }
    #skinMenuTitle { font-size:18px; color:#d8a0ff; text-align:center; margin-bottom:4px; font-weight:bold; letter-spacing:3px; }
    #skinMenuSub { font-size:10px; color:#664; text-align:center; margin-bottom:18px; }
    #skinGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
    .skin-card { background:rgba(20,10,40,0.9); border:1px solid rgba(120,60,200,0.4); border-radius:12px; padding:12px 8px; text-align:center; cursor:pointer; transition:all 0.18s; position:relative; }
    .skin-card:hover { border-color:rgba(200,100,255,0.7); transform:translateY(-2px); }
    .skin-card.skin-active { border-color:#d0a0ff; background:rgba(100,40,180,0.35); }
    .skin-card.skin-locked { opacity:0.5; cursor:default; }
    .skin-card.skin-locked:hover { transform:none; }
    .skin-card.skin-buyable { border-color:rgba(80,200,120,0.5); }
    .skin-emoji { font-size:36px; display:block; margin-bottom:6px; }
    .skin-name { font-size:10px; font-weight:bold; color:#ddd; margin-bottom:4px; }
    .skin-how { font-size:8px; color:#887; line-height:1.4; }
    .skin-badge { position:absolute; top:5px; right:5px; font-size:7px; padding:2px 5px; border-radius:4px; font-weight:bold; }
    .badge-free { background:rgba(60,200,80,0.3); color:#5d9; border:1px solid rgba(60,200,80,0.4); }
    .badge-buy  { background:rgba(80,160,255,0.2); color:#8cf; border:1px solid rgba(80,160,255,0.3); }
    .badge-earn { background:rgba(255,160,40,0.25); color:#fa6; border:1px solid rgba(255,160,40,0.35); }
    .badge-active{ background:rgba(255,220,60,0.25); color:#ffa; border:1px solid rgba(255,220,60,0.4); }
    .skin-cost  { font-size:8px; color:#888; margin-top:4px; }
    .skin-cost .has { color:#5d9; } .skin-cost .lacks { color:#f55; }
    #skinCloseBtn { display:block; margin:0 auto; padding:9px 28px; background:rgba(40,10,70,0.9); border:1px solid rgba(160,80,255,0.5); color:#c8a0ff; cursor:pointer; font-family:inherit; font-size:11px; border-radius:8px; }
    #skinCloseBtn:hover { background:rgba(80,20,140,0.9); }
</style>
</head>
<body>
<div id="hud">
  <div>❤️ HP:<span id="hp">100</span></div>
  <div>🩸<span id="lives">❤️❤️❤️</span></div>
  <div>🪐<span id="planet">—</span></div>
  <div>🪨<span id="rock">0</span></div>
  <div>🌿<span id="plant">0</span></div>
  <div>💎<span id="crystal">0</span></div>
  <div id="bh" style="display:none">🍌<span id="banana">0</span></div>
  <div>⚡<span id="fuel">0</span>/<span id="fuelMax">10</span></div>
  <button id="pauseBtn" onclick="togglePause()" style="padding:1px 7px;background:#111;border:1px solid #553;color:#887;cursor:pointer;font-family:inherit;font-size:10px;border-radius:2px;">⏸ Pause [P]</button>
  <button onclick="goMenu()" style="padding:1px 7px;background:#111;border:1px solid #335;color:#667;cursor:pointer;font-family:inherit;font-size:10px;border-radius:2px;">Menu</button>
</div>
<div id="invBar">🎒 Items: <span id="items">none</span> <button id="craftBtn" onclick="toggleCraft()">⚗️ Craft [C]</button> <span id="weaponHud" style="color:#f80;font-weight:bold;font-size:11px;margin-left:4px;"></span> <button onclick="openSkinMenu()" style="padding:2px 8px;background:rgba(80,0,140,0.85);border:1px solid rgba(180,80,255,0.5);color:#d0a0ff;cursor:pointer;font-family:inherit;font-size:10px;border-radius:3px;margin-left:4px;">🎭 Skins</button></div>
<canvas id="game" width="800" height="520"></canvas>
<div id="ctrl">WASD/Arrows: move | Space: gather/attack | Click: target | C: craft | M: map | P: pause</div>

<div id="message"><h2 id="mt"></h2><p id="mb"></p><button id="mbtn" onclick="closeMsg()">OK</button></div>
<div id="craftPanel"><h2>⚗️ Crafting</h2><div class="cgrid" id="cg"></div><button class="cclose" onclick="toggleCraft()">Close [C]</button></div>
<div id="mapOv"><canvas id="minimap" width="360" height="252"></canvas><button onclick="document.getElementById('mapOv').style.display='none'">Close</button></div>

<div id="villageShop">
  <div id="shopMerchantName"></div>
  <div id="shopMerchantDialog"></div>
  <div id="shopGrid"></div>
  <button id="shopCloseBtn" onclick="closeShop()">Leave Shop [Esc]</button>
</div>
<div id="skinMenu">
  <div id="skinMenuTitle">🎭 SKIN WARDROBE</div>
  <div id="skinMenuSub">SELECT YOUR LOOK — Some earned, some bought, some secret</div>
  <div id="skinGrid"></div>
  <button id="skinCloseBtn" onclick="closeSkinMenu()">✕ CLOSE</button>
</div>
<!-- Core -->
<script src="js/globals.js?v=4"></script>
<script src="js/save.js?v=4"></script>
<script src="js/hud.js?v=4"></script>
<script src="js/craft.js?v=4"></script>

<!-- Planet 1 (modular) -->
<script src="js/p1-data.js?v=4"></script>
<script src="js/p1-logic.js?v=4"></script>
<script src="js/p1-draw.js?v=4"></script>
<script src="js/planet1.js?v=4"></script>

<!-- Planet 2 (modular) -->
<script src="js/p2-data.js?v=4"></script>
<script src="js/p2-logic.js?v=4"></script>
<script src="js/p2-draw.js?v=4"></script>
<script src="js/planet2.js?v=4"></script>

<!-- Planet 3 (modular) -->
<script src="js/p3-data.js?v=4"></script>
<script src="js/p3-draw.js?v=4"></script>
<script src="js/p3-logic.js?v=4"></script>
<script src="js/planet3.js?v=4"></script>

<!-- Planet 4 (modular) -->
<script src="js/p4-data.js?v=4"></script>
<script src="js/p4-logic.js?v=4"></script>
<script src="js/p4-draw.js?v=4"></script>
<script src="js/planet4.js?v=4"></script>

<!-- Menu and Skins -->
<script src="js/menu.js?v=4"></script>
<script src="js/skins.js?v=4"></script>
</body>
</html>
